##############################
## General ###################
##############################
bridle_point_node: [0, 0, 0] #[x,y,z] --> location of kcu

## Mass
pulley_mass: !!float 0.09 #[kg] # 0.54 kg measured pulley mass / 6 modeled pulleys
kcu_mass: !!float 8.4 #[kg]

## Material properties
dyneema:
  # (M.B. Ruppert) [Pa]
  density: 1717 #[kg/m^3] equivalent reduced-bridle density -> m = density * A * l0
  youngs_modulus: 5000000000 #550000000 #[Pa] -> k = E A / l0
  damping_per_stiffness: 0.0 # [/s] -> c = damping_per_stiffness * k

fixed_point_indices: !!seq [0] # node indices that are fixed in space (0-based)

